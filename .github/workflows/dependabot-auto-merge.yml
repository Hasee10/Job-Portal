name: Dependabot Auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Auto-merge: all patch and minor updates
      # Auto-merge: major updates for dev dependencies and GitHub Actions
      # These are low-risk — branch protection still requires CI to pass first.
      - name: Enable auto-merge (safe updates)
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          (
            steps.meta.outputs.update-type == 'version-update:semver-major' &&
            (
              steps.meta.outputs.dependency-type == 'direct:development' ||
              steps.meta.outputs.package-ecosystem == 'github-actions'
            )
          )
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Comment on major production dep bumps so they're easy to find and review
      - name: Label major production bumps for manual review
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-major' &&
          steps.meta.outputs.dependency-type == 'direct:production' &&
          steps.meta.outputs.package-ecosystem != 'github-actions'
        run: |
          gh pr comment "$PR_URL" --body \
            "⚠️ **Major production dependency bump** — not auto-merged. Check the changelog for breaking changes, then merge or close manually."
          gh pr edit "$PR_URL" --add-label "needs-review" 2>/dev/null || true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
