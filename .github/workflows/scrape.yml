name: Job Scraper

# Runs every 12 hours on GitHub's own cloud runners - independent of any
# local machine being on. Complements (does not replace) the local Windows
# Scheduled Task in job-scraper/install_task.ps1; both write to the same
# Supabase table via idempotent upserts, so overlapping runs are harmless.
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    # The sweeper's HTTP-liveness check now runs with real concurrency
    # (see jobscraper/sweeper.py) instead of the old 5-at-a-time/1s-delay
    # design that got this job killed at the old 45-minute limit once the
    # table passed ~5,000 rows. 60 minutes is a safety margin, not the
    # expected runtime.
    timeout-minutes: 60
    defaults:
      run:
        working-directory: job-scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: job-scraper/requirements.txt

      # Playwright's Chromium (~180MB) and CloakBrowser's patched Chromium
      # (~200MB) get downloaded fresh every run without this - both are
      # versioned by their pinned package versions, so the cache key only
      # needs to change when requirements.txt changes.
      - name: Cache browser binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cloakbrowser
          key: browsers-${{ runner.os }}-${{ hashFiles('job-scraper/requirements.txt') }}

      # Sweeper "ambiguous status code" state (two-strike confirmation
      # before deactivating on a 400/403/451) needs to persist *across*
      # scheduled runs to mean anything - without this, every run on a
      # fresh checkout looks like the first sighting and the confirmation
      # step never fires. Restore-then-save-with-run-id is the standard
      # actions/cache pattern for a mutable checkpoint file (cache entries
      # are otherwise immutable per key).
      - name: Restore sweeper state
        uses: actions/cache/restore@v4
        with:
          path: job-scraper/sweeper_state.json
          key: sweeper-state-${{ github.run_id }}
          restore-keys: sweeper-state-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          python -m cloakbrowser install

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          # Optional - only needed if you've bought a residential proxy for
          # the Indeed/Glassdoor/Naukri/ZipRecruiter sources. GitHub Actions
          # runner IPs are well-known datacenter ranges and get blocked by
          # those sites more often than a home/residential connection would.
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
          CLOAKBROWSER_LICENSE_KEY: ${{ secrets.CLOAKBROWSER_LICENSE_KEY }}
        run: python run.py

      - name: Save sweeper state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: job-scraper/sweeper_state.json
          key: sweeper-state-${{ github.run_id }}

      - name: Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log
          path: job-scraper/logs/
          if-no-files-found: ignore
