name: Secret Scan

# Catches hardcoded API keys/tokens/passwords before they land on a pushed
# branch - the n8n-workflows/workflows/*.json leak (Supabase service_role,
# Adzuna, Jooble keys committed at 48803df) would have been flagged here had
# this existed at the time. Runs on every push and PR; does not block
# scheduled scraper runs or require any secrets of its own.
on:
  push:
  pull_request:

# gitleaks-action needs contents:read to check out code and pull-requests:write
# only to post a PR comment on findings - no other repo access required.
permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
