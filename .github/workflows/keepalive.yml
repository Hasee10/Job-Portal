name: Keepalive

# Pushes a timestamp commit once a month so GitHub never auto-disables
# scheduled workflows due to 60 days of repository inactivity.
# Workflow runs alone do NOT count as activity — only pushes do.

on:
  schedule:
    - cron: '0 0 1 * *'   # 00:00 UTC on the 1st of every month
  workflow_dispatch:        # manual trigger if needed

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Bump keepalive timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Push to a separate branch — main is protected and requires PRs.
          # Any push to the repo (any branch) resets GitHub's 60-day inactivity timer.
          git checkout -B keepalive
          echo "Last keepalive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > keepalive.txt
          git add keepalive.txt
          git diff --staged --quiet && echo "No change needed" && exit 0
          git commit -m "chore: keepalive [skip ci]"
          git push origin keepalive --force
