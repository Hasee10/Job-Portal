name: Job Alerts Cron

# Vercel's own cron (vercel.json) already hits this same endpoint once a
# day - that's the Hobby plan's hard ceiling (1 scheduled run/day, no
# more, no matter what's configured). This workflow calls it more often
# for free via GitHub Actions instead of paying for Vercel Pro.
#
# Safe to run more frequently than the Vercel cron: app/api/cron/search-
# alerts is idempotent - it tracks notifiedJobIds/matchedJobIds per seeker
# and only emails about jobs it hasn't already sent, so extra runs just
# mean alerts go out sooner, never duplicated. The two schedules don't
# need to be coordinated.
#
# CRON_SECRET is optional on both ends: app/api/cron/search-alerts only
# enforces the Bearer token check when process.env.CRON_SECRET is set in
# Vercel - if it isn't (currently the case), the endpoint accepts any
# request, including one with no Authorization header at all. This
# workflow works either way: it sends the header only if a CRON_SECRET
# repository secret exists, and calls without one otherwise. Add the
# secret later (Settings -> Secrets and variables -> Actions) - matching
# whatever you eventually set in Vercel - to lock the endpoint down; until
# then it stays open to anyone who knows the URL, which is a minor but
# real exposure worth closing off eventually.
#
# Set a PORTAL_URL repository variable (Settings -> Secrets and variables
# -> Actions -> Variables) if NEXT_PUBLIC_APP_URL in Vercel points to a
# custom domain rather than the default *.vercel.app one - otherwise this
# falls back to the vercel.app URL, which may be stale.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  trigger-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Call job alerts cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PORTAL_URL: ${{ vars.PORTAL_URL || 'https://job-portal-ten-pi.vercel.app' }}
        run: |
          auth_header=()
          if [ -n "$CRON_SECRET" ]; then
            auth_header=(-H "Authorization: Bearer $CRON_SECRET")
          else
            echo "No CRON_SECRET repository secret set - calling without an Authorization header (the endpoint currently has no auth enforced, per its own CRON_SECRET env check)."
          fi
          status=$(curl -sS -o response.json -w "%{http_code}" \
            -X GET "$PORTAL_URL/api/cron/search-alerts" \
            "${auth_header[@]}")
          echo "HTTP $status"
          cat response.json
          if [ "$status" -ge 300 ]; then
            echo "::error::Job alerts cron call failed with HTTP $status"
            exit 1
          fi
