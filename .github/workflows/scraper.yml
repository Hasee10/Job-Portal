name: Job Scraper

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  scrape:
    name: Scrape & ingest jobs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Python scraper (API sources only — no browser in CI) ───────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: job-scraper/requirements-ci.txt

      - name: Install Python dependencies
        run: pip install -r job-scraper/requirements-ci.txt

      - name: Run Python scraper (API sources)
        working-directory: job-scraper
        env:
          COCKROACH_DATABASE_URL: ${{ secrets.COCKROACH_WRITER_URL }}
        run: python run.py --no-browser --no-sweep

      # ── Node.js RSS scraper ───────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bordful-main/package-lock.json

      - name: Install Node dependencies
        working-directory: bordful-main
        run: npm ci

      - name: Run RSS scraper
        working-directory: bordful-main
        env:
          COCKROACH_WRITER_URL: ${{ secrets.COCKROACH_WRITER_URL }}
        run: npx tsx scripts/scraper/index.ts rss

      # ── Sweeper (mark stale jobs inactive) ────────────────────────────────
      - name: Run sweeper
        working-directory: job-scraper
        env:
          COCKROACH_DATABASE_URL: ${{ secrets.COCKROACH_WRITER_URL }}
        run: python run.py --sweep-only

      # ── Step summary ──────────────────────────────────────────────────────
      - name: Post run summary
        if: always()
        run: |
          if [ -f job-scraper/run_summary.json ]; then
            python3 - <<'EOF'
          import json, os, sys
          path = "job-scraper/run_summary.json"
          data = json.loads(open(path).read())
          out = []
          out.append("## Scraper run summary")
          out.append(f"**Timestamp:** {data.get('timestamp','')}")
          out.append(f"**Jobs upserted:** {data.get('upserted', 0)}")
          out.append(f"**Sweeper marked inactive:** {data.get('sweeper_marked', 0)}")
          out.append("")
          out.append("| Source | Result | Status |")
          out.append("|--------|--------|--------|")
          for s in data.get("sources", []):
              if s.get("skipped"):
                  icon, label = "⏭️", f"skipped ({s['skipped']})"
              elif s.get("error"):
                  icon, label = "❌", f"error: {s['error'][:80]}"
              elif s.get("count", 0) == 0:
                  icon, label = "⚠️", "0 jobs"
              else:
                  icon, label = "✅", f"{s['count']} jobs"
              out.append(f"| {s['source']} | {label} | {icon} |")
          needs_attention = data.get("sources_needing_attention", [])
          if needs_attention:
              out.append("")
              out.append("### ⚠️ Sources needing attention")
              for s in needs_attention:
                  out.append(f"- **{s['source']}**: {s.get('error') or '0 jobs returned'}")
          summary_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_env:
              open(summary_env, "a").write("\n".join(out) + "\n")
          else:
              print("\n".join(out))
          EOF
          fi
