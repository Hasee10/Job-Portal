version: 2
updates:
  # Portal (Next.js) dependencies
  - package-ecosystem: "npm"
    directory: "/bordful-main"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Tailwind v4 moved its PostCSS plugin to a separate @tailwindcss/
      # postcss package and changed the config format - auto-merging (or
      # even just leaving an open PR for) a major bump here breaks every
      # build until someone does the actual migration deliberately. Minor/
      # patch v3.x updates still come through normally.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  # Scraper (Python) dependencies - pinned to exact versions (2026-07), so
  # Dependabot's PRs are the intended way to review and bump them deliberately
  # instead of a floating range silently pulling in whatever's newest.
  - package-ecosystem: "pip"
    directory: "/job-scraper"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Keep the workflow actions themselves (checkout, cache, setup-python, etc.)
  # current - an out-of-date action is itself a supply-chain surface.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
